    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg: #09090b;
        --surface: #131316;
        --surface-2: #1a1a1f;
        --border: #23232a;
        --border-hover: #33333d;
        --text: #f4f4f5;
        --text-muted: #71717a;
        --text-dim: #52525b;
        --accent: #c9a87c;
        --accent-hover: #d9bc96;
        --accent-glow: rgba(201, 168, 124, 0.06);
        --accent-glow-strong: rgba(201, 168, 124, 0.12);
        --radius: 12px;
        --radius-lg: 20px;
        --radius-xl: 28px;
        --font: "Inter", -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      html {
        scroll-behavior: smooth;
        -webkit-text-size-adjust: 100%;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font);
        line-height: 1.6;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* ─── Hero Section ────────────────────────── */

      .hero {
        position: relative;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 80px 24px;
        text-align: center;
      }

      .hero::before {
        content: "";
        position: absolute;
        top: -20%;
        left: 50%;
        transform: translateX(-50%);
        width: 800px;
        height: 800px;
        background: radial-gradient(
          circle,
          var(--accent-glow-strong) 0%,
          var(--accent-glow) 30%,
          transparent 65%
        );
        pointer-events: none;
        z-index: 0;
      }

      .hero-content {
        position: relative;
        z-index: 1;
        max-width: 480px;
        width: 100%;
      }

      /* ─── App Icon ────────────────────────────── */

      .app-icon {
        width: 96px;
        height: 96px;
        border-radius: 22px;
        background: linear-gradient(
          135deg,
          var(--surface-2) 0%,
          var(--surface) 100%
        );
        border: 1px solid var(--border);
        margin: 0 auto 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        color: var(--text-dim);
        letter-spacing: 0.5px;
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.3),
          inset 0 1px 0 rgba(255, 255, 255, 0.03);
        animation: fadeDown 1s ease forwards;
      }

      .app-icon img {
        width: 100%;
        height: 100%;
        border-radius: 22px;
        object-fit: cover;
      }

      /* ─── Typography ──────────────────────────── */

      .hero-title {
        font-size: clamp(2.5rem, 6vw, 3.5rem);
        font-weight: 700;
        letter-spacing: -0.02em;
        line-height: 1.1;
        margin-bottom: 12px;
        animation: fadeDown 1s ease 0.1s both;
      }

      .hero-title span {
        background: linear-gradient(
          135deg,
          var(--text) 0%,
          var(--accent) 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .hero-subtitle {
        font-size: clamp(1rem, 2.5vw, 1.2rem);
        color: var(--text-muted);
        margin-bottom: 40px;
        font-weight: 400;
        animation: fadeDown 1s ease 0.2s both;
      }

      /* ─── Form ────────────────────────────────── */

      .form-wrapper {
        animation: fadeDown 1s ease 0.3s both;
      }

      .waitlist-form {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .input-field {
        width: 100%;
        padding: 14px 18px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text);
        font-family: var(--font);
        font-size: 15px;
        outline: none;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }

      .input-field::placeholder {
        color: var(--text-dim);
      }

      .input-field:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-glow-strong);
      }

      .submit-btn {
        width: 100%;
        padding: 14px 24px;
        background: var(--accent);
        color: #09090b;
        border: none;
        border-radius: var(--radius);
        font-family: var(--font);
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s ease, transform 0.15s ease;
        letter-spacing: 0.01em;
      }

      .submit-btn:hover {
        background: var(--accent-hover);
      }

      .submit-btn:active {
        transform: scale(0.98);
      }

      .submit-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

        align-items: center;
        justify-content: center;
